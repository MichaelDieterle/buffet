version: '3.8'

services:
  backend:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    # Optional: depends on db/redis if needed
    # depends_on:
    #   - db
    #   - redis

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    # For development you might want to mount source:
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    #   - /app/.next
