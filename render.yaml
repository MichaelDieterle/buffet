services:
  - type: web
    name: buffet-backend
    env: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buffet-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"

databases:
  - name: buffet-db
    plan: free
    databaseName: buffet
    user: buffet_user
